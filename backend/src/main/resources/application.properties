# Application Name
spring.application.name=mgstore-backend

# Server Configuration
server.port=8891
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mgstore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JWT Configuration
jwt.secret=${JWT_SECRET:dev-jwt-secret-change-me-in-production-32chars-min}
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:5173,http://localhost:3000

# Culqi Configuration
culqi.public.key=${CULQI_PUBLIC_KEY:pk_test_replace_me}
culqi.secret.key=${CULQI_SECRET_KEY:sk_test_replace_me}
culqi.api.url=https://api.culqi.com/v2

# WhatsApp Configuration
whatsapp.api.url=https://graph.facebook.com/v17.0
whatsapp.phone.number.id=your_phone_number_id
whatsapp.access.token=your_whatsapp_access_token
whatsapp.phone.number=+51999999999

# Logging
logging.level.root=INFO
logging.level.com.mgstore=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.metrics.export.prometheus.enabled=true

# Rate Limiting
security.rate-limit.enabled=true
security.rate-limit.login.max-requests=5
security.rate-limit.login.window-seconds=300
security.rate-limit.checkout.max-requests=20
security.rate-limit.checkout.window-seconds=60
security.rate-limit.payment.max-requests=10
security.rate-limit.payment.window-seconds=60
