# Production Profile Configuration

# Server Configuration
server.port=8891
server.servlet.context-path=/api

# Database Configuration - Production (use environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/mgstore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration - Production Optimized
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate - Production
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# JWT Configuration - Production (use environment variable)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS Configuration - Production (use environment variable)
cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

# Culqi Configuration - Production (use environment variables)
culqi.public.key=${CULQI_PUBLIC_KEY}
culqi.secret.key=${CULQI_SECRET_KEY}
culqi.api.url=https://api.culqi.com/v2

# WhatsApp Configuration - Production (use environment variables)
whatsapp.api.url=${WHATSAPP_API_URL:https://graph.facebook.com/v18.0}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.access.token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.phone.number=${WHATSAPP_PHONE_NUMBER:+51999999999}

# Logging - Minimal for production
logging.level.root=WARN
logging.level.com.mgstore=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Error handling - Hide sensitive info in production
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Actuator - Production security
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# Performance Optimization
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Security Headers
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Rate Limiting - Production
security.rate-limit.enabled=${SECURITY_RATE_LIMIT_ENABLED:true}
security.rate-limit.login.max-requests=${SECURITY_RATE_LIMIT_LOGIN_MAX_REQUESTS:5}
security.rate-limit.login.window-seconds=${SECURITY_RATE_LIMIT_LOGIN_WINDOW_SECONDS:300}
security.rate-limit.checkout.max-requests=${SECURITY_RATE_LIMIT_CHECKOUT_MAX_REQUESTS:20}
security.rate-limit.checkout.window-seconds=${SECURITY_RATE_LIMIT_CHECKOUT_WINDOW_SECONDS:60}
security.rate-limit.payment.max-requests=${SECURITY_RATE_LIMIT_PAYMENT_MAX_REQUESTS:10}
security.rate-limit.payment.window-seconds=${SECURITY_RATE_LIMIT_PAYMENT_WINDOW_SECONDS:60}
