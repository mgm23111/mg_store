groups:
  - name: mgstore-alerts
    rules:
      - alert: MgStoreBackendDown
        expr: up{job="mgstore-backend"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MG Store backend is down"
          description: "Prometheus cannot scrape mgstore-backend for more than 2 minutes."

      - alert: MgStoreHigh5xxRate
        expr: sum(rate(http_server_requests_seconds_count{job="mgstore-backend",status=~"5.."}[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx rate"
          description: "5xx error rate is above threshold in the last 5 minutes."
